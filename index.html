<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passer By</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

        .card-enter { animation: slideIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .card-exit-left { animation: slideOutLeft 0.5s ease-in forwards; }
        .card-exit-right { animation: slideOutRight 0.5s ease-in forwards; }
        .stamp-anim { animation: stampDown 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .jackpot-anim { animation: jackpotFly 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        @keyframes slideIn { from { transform: translateY(100px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        @keyframes slideOutLeft { from { transform: translateX(0) rotate(-15deg); opacity: 1; } to { transform: translateX(-150%) rotate(-25deg); opacity: 0; } }
        @keyframes slideOutRight { from { transform: translateX(0) rotate(15deg); opacity: 1; } to { transform: translateX(150%) rotate(25deg); opacity: 0; } }
        @keyframes stampDown { 0% { transform: scale(3) rotate(-10deg); opacity: 0; } 50% { transform: scale(0.9) rotate(-10deg); opacity: 1; } 100% { transform: scale(1) rotate(-10deg); opacity: 1; } }
        @keyframes jackpotFly { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 20% { transform: translateY(-30px) scale(1.2); opacity: 1; } 80% { transform: translateY(-40px) scale(1.1); opacity: 1; } 100% { transform: translateY(-60px) scale(1); opacity: 0; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
        @keyframes snow { 0% { transform: translateY(-10vh); } 100% { transform: translateY(110vh); } }
        @keyframes siren { 0%, 100% { opacity: 0; } 50% { opacity: 0.15; } }
        
        /* Dynamic scanner animation */
        @keyframes scan { 0% { top: 0%; } 50% { top: 100%; } 100% { top: 0%; } }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 font-mono overflow-x-hidden">
    <div id="app-root"></div>

    <script>
        // --- Generators & Data ---
        const COUNTRIES = ['Novistrana', 'Oslia', 'Republia', 'Antegria', 'United Federation'];
        const FIRST_NAMES = ['Alek', 'Boris', 'Elena', 'Katarina', 'Dmitri', 'Ivan', 'Natalia', 'Viktor', 'Anya', 'Sergei', 'Yuri', 'Mikhail', 'Svetlana', 'Igor', 'Tatiana', 'Lev', 'Oleg', 'Raisa'];
        const LAST_NAMES = ['Ivanov', 'Kuznetsov', 'Popov', 'Sokolov', 'Volkov', 'Morozov', 'Novikov', 'Fedorov', 'Smirnov', 'Lebedev', 'Kozlov', 'Orlov', 'Petrov', 'Semenov'];
        const REASONS = [
          "I am visiting my sick mother. Please, I don't have much time.", "Just passing through for business. I deal in textiles.", "I'm fleeing the conflict in the northern provinces.",
          "Tourism. I hear your country is beautiful this time of year.", "I have a new job waiting for me in the capital.", "I am seeking asylum. They will kill me if I go back.",
          "Returning home after studying abroad for five years.", "I'm here for a specialized medical procedure.", "Attending my brother's wedding. I have the invitation here somewhere...",
          "I lost a bet and have to walk across the border in these shoes.", "Visiting my pen pal! We've been writing to each other for 10 years.", "I'm a journalist covering the border situation. Don't mind me.",
          "Just trying to buy some rare spices from your local markets.", "My dog ran across the border yesterday. I'm just going to get him!", "Transporting some antique clocks for a private collector.",
          "I'm a musician on tour. The rest of the band is already across.", "Looking for a better life. Any life, really. It's tough out there.", "I heard the soil here is perfect for growing winter cabbage."
        ];
        const ITEMS = ['Clothes', 'Books', 'Suspicious Package', 'Family Photos', 'Tools', 'Large amounts of cash', 'Medical Supplies', 'Canned Food', 'Briefcase'];
        const CONTRABAND = ['Unregistered Weapon', 'Forged Documents', 'Smuggled Gold', 'Illegal Transmitters', 'Banned Literature', 'Counterfeit Currency'];

        // --- Sound Engine (Web Audio API) ---
        const sfx = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            },
            play(type) {
                try {
                    this.init();
                    const t = this.ctx.currentTime;
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);

                    if (type === 'click') {
                        osc.type = 'sine'; osc.frequency.setValueAtTime(800, t);
                        gain.gain.setValueAtTime(0.05, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
                        osc.start(t); osc.stop(t + 0.05);
                    } else if (type === 'stamp') {
                        osc.type = 'square'; osc.frequency.setValueAtTime(100, t); osc.frequency.exponentialRampToValueAtTime(0.01, t + 0.1);
                        gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                        osc.start(t); osc.stop(t + 0.1);
                    } else if (type === 'approve') {
                        osc.type = 'sine'; osc.frequency.setValueAtTime(400, t); osc.frequency.setValueAtTime(600, t + 0.1);
                        gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.3);
                        osc.start(t); osc.stop(t + 0.3);
                    } else if (type === 'deny') {
                        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, t); osc.frequency.linearRampToValueAtTime(100, t + 0.3);
                        gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.3);
                        osc.start(t); osc.stop(t + 0.3);
                    } else if (type === 'bribe') {
                        osc.type = 'sine'; osc.frequency.setValueAtTime(1200, t); osc.frequency.setValueAtTime(1600, t + 0.1);
                        gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.3);
                        osc.start(t); osc.stop(t + 0.3);
                    } else if (type === 'scan') {
                        osc.type = 'triangle'; osc.frequency.setValueAtTime(200, t); osc.frequency.linearRampToValueAtTime(400, t + 1.0);
                        gain.gain.setValueAtTime(0.05, t); gain.gain.linearRampToValueAtTime(0, t + 1.0);
                        osc.start(t); osc.stop(t + 1.0);
                    } else if (type === 'alert') {
                        osc.type = 'square'; osc.frequency.setValueAtTime(300, t); osc.frequency.setValueAtTime(400, t + 0.2); osc.frequency.setValueAtTime(300, t + 0.4);
                        gain.gain.setValueAtTime(0.05, t); gain.gain.linearRampToValueAtTime(0, t + 0.6);
                        osc.start(t); osc.stop(t + 0.6);
                    } else if (type === 'jackpot') {
                        osc.type = 'square'; osc.frequency.setValueAtTime(400, t); osc.frequency.setValueAtTime(500, t + 0.1); osc.frequency.setValueAtTime(600, t + 0.2); osc.frequency.setValueAtTime(800, t + 0.3);
                        gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0, t + 0.6);
                        osc.start(t); osc.stop(t + 0.6);
                    } else if (type === 'gameover') {
                        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, t); osc.frequency.exponentialRampToValueAtTime(10, t + 1.5);
                        gain.gain.setValueAtTime(0.2, t); gain.gain.linearRampToValueAtTime(0, t + 1.5);
                        osc.start(t); osc.stop(t + 1.5);
                    } else if (type === 'tick') {
                        osc.type = 'sine'; osc.frequency.setValueAtTime(1000, t);
                        gain.gain.setValueAtTime(0.02, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
                        osc.start(t); osc.stop(t + 0.05);
                    } else if (type === 'explosion') {
                        osc.type = 'square'; osc.frequency.setValueAtTime(100, t); osc.frequency.exponentialRampToValueAtTime(0.01, t + 1.0);
                        gain.gain.setValueAtTime(0.5, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 1.0);
                        osc.start(t); osc.stop(t + 1.0);
                    }
                } catch (e) {}
            }
        };
        const playClick = () => sfx.play('click');

        // --- Game State ---
        let state = {
            gameState: 'intro', // intro, day_start, playing, loan_offer, day_end, game_over
            day: 1,
            quota: 0,
            familyComfort: 80,
            rankProgress: 0,
            rankLevel: 1,
            streak: 0,
            debt: 0,
            gameOverReason: "",
            directive: null,
            dailyEvent: null,
            currentNPC: null,
            wantedCriminal: null,
            upgrades: { scannerLvl: 0, syndicateLvl: 0, heatLvl: 0, coffeeLvl: 0 },
            checkpoint: null,
            cardState: 'story',
            scanStatus: 'idle',
            animating: 'in',
            stamp: null,
            lootPopup: null,
            npcPatience: 100,
            npcSpeech: "",
            shake: false,
            tickSound: false
        };

        // --- Timers ---
        let patienceInterval;
        let bombInterval;
        let speechTimeout;

        // --- Derived Values ---
        const getTargetQuota = () => 4 + Math.floor(state.day * 1.5);
        const getBaseDailyCost = () => 10 + Math.floor(state.day * 4.5);
        const getCurrentBribeValue = () => state.currentNPC?.bribe > 0 ? Math.floor(state.currentNPC.bribe * (1 + (state.upgrades.syndicateLvl * 0.2))) : 0;
        const getPatienceColor = () => state.npcPatience > 60 ? 'bg-green-500' : state.npcPatience > 30 ? 'bg-yellow-500' : 'bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.8)]';
        
        // --- Generators ---
        const generateNewWanted = (currentDay) => {
            const name = `${FIRST_NAMES[Math.floor(Math.random() * FIRST_NAMES.length)]} ${LAST_NAMES[Math.floor(Math.random() * LAST_NAMES.length)]}`;
            const country = COUNTRIES[Math.floor(Math.random() * COUNTRIES.length)];
            return { name, country, bountyComfort: 20 + (currentDay * 5), bountyRank: 30 + (currentDay * 2) };
        };

        const generatePasserby = (currentDay, currentWanted, event) => {
            if (currentWanted && Math.random() < 0.1) {
                return { id: Math.random().toString(36).substr(2, 9), name: currentWanted.name, country: currentWanted.country, reason: "I am definitely a normal citizen doing normal things.", items: ['Suspicious Package'], hiddenItem: 'Unregistered Weapon', passportExp: `1988`, bribe: 40 + (currentDay * 5), isWanted: true, isVIP: false, isBomber: false };
            }
            if (event?.id === 'bomb' && Math.random() < 0.15) {
                return { id: Math.random().toString(36).substr(2, 9), name: "UNKNOWN", country: "Oslia", reason: "Glory to the cause.", items: ['Briefcase'], hiddenItem: 'Explosive Device', passportExp: `1988`, bribe: 0, isWanted: false, isVIP: false, isBomber: true };
            }
            const isVIP = Math.random() < 0.05;
            const isBribing = isVIP ? true : (event?.id === 'syndicate' ? Math.random() > 0.4 : Math.random() > 0.7);
            const isExpired = Math.random() > 0.8;
            const hasContraband = isVIP ? true : Math.random() > 0.65;
            const country = COUNTRIES[Math.floor(Math.random() * COUNTRIES.length)];
            const name = `${FIRST_NAMES[Math.floor(Math.random() * FIRST_NAMES.length)]} ${LAST_NAMES[Math.floor(Math.random() * LAST_NAMES.length)]}`;
            let baseBribe = Math.floor(Math.random() * 20) + 10;
            if (event?.id === 'syndicate') baseBribe *= 2;
            if (isVIP) baseBribe = Math.floor(Math.random() * 80) + 80 + (currentDay * 2); 
            return {
                id: Math.random().toString(36).substr(2, 9), name, country,
                reason: isVIP ? "I am a very important person. Open the gate, take the money, and look away." : REASONS[Math.floor(Math.random() * REASONS.length)],
                items: [ITEMS[Math.floor(Math.random() * ITEMS.length)]],
                hiddenItem: hasContraband ? (isVIP ? 'Smuggled Gold' : CONTRABAND[Math.floor(Math.random() * CONTRABAND.length)]) : null,
                passportExp: isExpired ? `198${Math.floor(Math.random() * 4)}` : `198${Math.floor(Math.random() * 5 + 6)}`,
                bribe: isBribing ? baseBribe : 0, isWanted: false, isVIP, isBomber: false
            };
        };

        const generateDailyEvent = () => {
            const roll = Math.random();
            if (roll < 0.15) return { id: 'bomb', name: "TERRORIST THREAT", desc: "A bomber is approaching the checkpoint. DO NOT LET THEM IN.", color: "text-orange-500" };
            if (roll < 0.30) return { id: 'inspection', name: "SURPRISE INSPECTION", desc: "Command is watching closely. All Rank penalties are DOUBLED today.", color: "text-red-500" };
            if (roll < 0.45) return { id: 'freeze', name: "BITTER COLD", desc: "A terrible storm hits. Family living expenses are DOUBLED tonight.", color: "text-cyan-400" };
            if (roll < 0.60) return { id: 'syndicate', name: "SYNDICATE PUSH", desc: "The underworld is active. Expect more bribes and larger amounts.", color: "text-purple-400" };
            return null;
        };

        const generateNewDirective = (currentDay, ev) => {
            if (ev?.id === 'bomb') return { text: "CRITICAL: Extremists reported in sector. Detain anyone carrying an explosive device.", type: 'normal' };
            const roll = Math.random();
            if (roll < 0.3 && currentDay > 1) {
                const target = COUNTRIES[Math.floor(Math.random() * COUNTRIES.length)];
                return { text: `Tensions high. Deny all citizens of ${target}. Demand a 'Signed Letter from the Moon'.`, type: 'ridiculous', targetCountry: target, ridiculousItem: 'Signed Letter from the Moon' };
            } else if (roll < 0.6 && currentDay > 2) {
                return { text: `Smugglers active. Reject anyone with a 'Suspicious Package'. Demand a 'Left-handed Screwdriver'.`, type: 'ridiculous', targetItem: 'Suspicious Package', ridiculousItem: 'Left-handed Screwdriver' };
            } else {
                return { text: "Routine checks. Ensure passports are valid (Year: 1985). Scan for contraband.", type: 'normal' };
            }
        };

        // --- Logic Handlers ---
        window.startGame = (fromCheckpoint = false) => {
            playClick();
            if (fromCheckpoint && state.checkpoint) {
                state.day = state.checkpoint.day; state.quota = 0; state.familyComfort = state.checkpoint.familyComfort;
                state.rankProgress = state.checkpoint.rankProgress; state.rankLevel = state.checkpoint.rankLevel; state.streak = 0; state.debt = state.checkpoint.debt;
                state.upgrades = JSON.parse(JSON.stringify(state.checkpoint.upgrades));
                const ev = generateDailyEvent(); state.dailyEvent = ev; state.directive = generateNewDirective(state.day, ev);
                state.wantedCriminal = null; state.currentNPC = generatePasserby(state.day, null, ev);
            } else {
                state.day = 1; state.quota = 0; state.familyComfort = 80; state.rankProgress = 0; state.rankLevel = 1; state.streak = 0; state.debt = 0;
                state.upgrades = { scannerLvl: 0, syndicateLvl: 0, heatLvl: 0, coffeeLvl: 0 }; state.checkpoint = null;
                const ev = generateDailyEvent(); state.dailyEvent = ev; state.directive = generateNewDirective(1, ev);
                state.wantedCriminal = null; state.currentNPC = generatePasserby(1, null, ev);
            }
            state.gameState = 'day_start'; state.cardState = 'story'; state.scanStatus = 'idle'; state.stamp = null; state.lootPopup = null; state.npcPatience = 100;
            render();
        };

        window.setCardState = (tab) => {
            playClick();
            state.cardState = tab;
            render();
        }

        window.handleScan = () => {
            sfx.play('scan'); state.scanStatus = 'scanning';
            render();
            const scanTime = Math.max(300, 1500 - (state.upgrades.scannerLvl * 250)); 
            setTimeout(() => {
                if (state.currentNPC.hiddenItem) { state.scanStatus = 'contraband'; sfx.play('alert'); } 
                else { state.scanStatus = 'clean'; sfx.play('approve'); }
                render();
            }, scanTime);
        };

        window.handleAction = (actionType) => {
            if (state.animating || state.stamp || state.scanStatus === 'scanning') return;

            let rankChange = 0; let comfortChange = 0; let visualStamp = ''; let mistakeMade = false; let lootResult = null;
            
            if (actionType === 'timeout') {
                visualStamp = 'WALKED OFF'; rankChange = -15; mistakeMade = true;
            } else {
                if (actionType === 'allow' && state.currentNPC.isBomber) {
                    state.stamp = 'APPROVED';
                    render();
                    sfx.play('explosion'); state.shake = true; render();
                    setTimeout(() => {
                        state.gameOverReason = "You approved an extremist. The checkpoint was destroyed in the blast.";
                        state.gameState = 'game_over';
                        render();
                    }, 1000);
                    return;
                }

                const isExpired = parseInt(state.currentNPC.passportExp) < 1985;
                const isTargetCountry = state.directive.type === 'ridiculous' && state.directive.targetCountry === state.currentNPC.country;
                const hasTargetItem = state.directive.type === 'ridiculous' && state.currentNPC.items.includes(state.directive.targetItem);
                const hasContraband = !!state.currentNPC.hiddenItem;
                const shouldBeDenied = isExpired || isTargetCountry || hasTargetItem || hasContraband || state.currentNPC.isWanted || state.currentNPC.isBomber;

                if (actionType === 'allow') {
                    visualStamp = 'APPROVED';
                    if (state.currentNPC.isWanted) { rankChange = -60; mistakeMade = true; } 
                    else if (shouldBeDenied) { rankChange = -15; mistakeMade = true; } 
                    else { rankChange = 5; }
                } 
                else if (actionType === 'deny') {
                    visualStamp = 'DENIED';
                    if (state.currentNPC.isWanted || state.currentNPC.isBomber) { rankChange = -30; mistakeMade = true; } 
                    else if (shouldBeDenied) { 
                        if (state.directive.type === 'ridiculous' && (isTargetCountry || hasTargetItem)) { rankChange = -5; mistakeMade = true; } 
                        else { rankChange = 5; }
                    } else { rankChange = -10; mistakeMade = true; }
                } 
                else if (actionType === 'bribe') {
                    visualStamp = 'BRIBED';
                    comfortChange = Math.floor(state.currentNPC.bribe * (1 + (state.upgrades.syndicateLvl * 0.2)));
                    rankChange = -25; mistakeMade = true; 
                    if (state.currentNPC.isWanted) rankChange -= 40; 
                } 
                else if (actionType === 'ridiculous') {
                    visualStamp = 'DENIED';
                    if (state.directive.type === 'ridiculous' && (isTargetCountry || hasTargetItem)) rankChange = 10; 
                    else { rankChange = -15; mistakeMade = true; }
                }
                else if (actionType === 'detain_report') {
                    visualStamp = 'DETAINED';
                    if (state.currentNPC.isWanted) { rankChange = state.wantedCriminal.bountyRank; comfortChange = state.wantedCriminal.bountyComfort; state.wantedCriminal = null; } 
                    else if (state.currentNPC.isBomber) { rankChange = 50; } 
                    else if (hasContraband) { rankChange = 15; } 
                    else { rankChange = -25; mistakeMade = true; }
                }
                else if (actionType === 'detain_confiscate') {
                    visualStamp = 'DETAINED'; mistakeMade = true; 
                    if (state.currentNPC.isBomber) {
                        sfx.play('explosion'); state.shake = true; render();
                        setTimeout(() => { state.gameOverReason = "You tried to steal an explosive device. It detonated in the back room."; state.gameState = 'game_over'; render(); }, 1000);
                        return;
                    }
                    if (hasContraband) {
                        const roll = Math.random();
                        if (roll > 0.90) { comfortChange = 40; lootResult = 'JACKPOT'; } 
                        else if (roll > 0.60) { comfortChange = 10; lootResult = 'RARE'; } 
                        else { comfortChange = 2; lootResult = 'JUNK'; } 
                        
                        if (Math.random() < 0.2) {
                            rankChange = -30; visualStamp = 'CAUGHT'; comfortChange = 0; lootResult = 'CONFISCATED BY CMD';
                        }
                    } else { rankChange = -25; }
                }
            }

            if (mistakeMade) {
                state.streak = 0;
                if (state.dailyEvent?.id === 'inspection') rankChange *= 2; 
            } else {
                state.streak++;
                if (state.streak >= 3) rankChange = Math.floor(rankChange * 1.5); 
                if (state.streak >= 10) rankChange *= 2;
            }

            state.stamp = visualStamp;
            if (visualStamp !== 'WALKED OFF') sfx.play('stamp');
            
            if (lootResult) {
                state.lootPopup = { type: lootResult, amount: comfortChange };
                if (lootResult === 'JACKPOT') setTimeout(() => sfx.play('jackpot'), 200);
                else if (lootResult === 'RARE') setTimeout(() => sfx.play('bribe'), 200);
            } else if (actionType === 'bribe') {
                setTimeout(() => sfx.play('bribe'), 200);
            } else if (mistakeMade && actionType !== 'timeout') {
                setTimeout(() => sfx.play('deny'), 200);
            } else if (!mistakeMade) {
                setTimeout(() => sfx.play('approve'), 200);
            }
            
            if (visualStamp === 'DENIED' || visualStamp === 'CAUGHT' || visualStamp === 'WALKED OFF') {
                state.shake = true; 
                setTimeout(() => { state.shake = false; render(); }, 500);
            }
            if (state.currentNPC && state.currentNPC.isWanted) state.wantedCriminal = null;
            
            render(); // render stamp immediately
            const dir = (actionType === 'allow' || actionType === 'bribe') ? 'right' : 'left';

            setTimeout(() => {
                state.animating = dir;
                render();
                setTimeout(() => {
                    state.rankProgress += rankChange;
                    if (state.rankProgress >= 100) { state.rankLevel++; state.rankProgress -= 100; }
                    if (state.rankProgress < 0 && state.rankLevel > 1) { state.rankLevel--; state.rankProgress += 100; } 
                    
                    state.familyComfort += comfortChange;
                    state.quota++;
                    
                    if (state.rankLevel === 1 && state.rankProgress <= -50) {
                        state.gameOverReason = "Command has reviewed your atrocious performance. You have been stripped of your rank and sent to the labor camps.";
                        sfx.play('gameover'); state.gameState = 'game_over'; render(); return;
                    }

                    if (state.quota >= getTargetQuota()) {
                        state.gameState = 'day_end';
                    } else {
                        state.currentNPC = generatePasserby(state.day, state.wantedCriminal, state.dailyEvent);
                        state.cardState = 'story'; state.scanStatus = 'idle'; state.stamp = null; state.lootPopup = null; state.npcPatience = 100;
                        state.animating = 'in'; 
                        setTimeout(() => { state.animating = null; render(); }, 300);
                    }
                    render();
                }, 400); 
            }, 700); 
        };

        window.handleEndDay = () => {
            playClick();
            let dailyExpense = getBaseDailyCost() - (state.upgrades.heatLvl * 5);
            if (state.dailyEvent?.id === 'freeze') dailyExpense *= 2;
            dailyExpense = Math.max(5, dailyExpense); 
            if (state.debt > 0) dailyExpense += 25; 

            state.familyComfort -= dailyExpense;
            
            if (state.familyComfort <= 0) {
                if (state.debt === 0) {
                    state.gameState = 'loan_offer'; render(); return;
                } else {
                    state.gameOverReason = `You defaulted on your Syndicate loan. They came to your house in the middle of the night. You failed your family.`;
                    sfx.play('gameover'); state.gameState = 'game_over'; render(); return;
                }
            }
            
            state.day++;
            const ev = generateDailyEvent(); state.dailyEvent = ev; state.directive = generateNewDirective(state.day, ev);
            
            if (state.day % 5 === 1) {
                state.checkpoint = { day: state.day, familyComfort: state.familyComfort, rankProgress: state.rankProgress, rankLevel: state.rankLevel, upgrades: JSON.parse(JSON.stringify(state.upgrades)), debt: state.debt };
            }
            
            let currentWanted = state.wantedCriminal;
            if (state.day % 4 === 0 && !currentWanted) currentWanted = generateNewWanted(state.day);

                            <div class="grid grid-cols-2 gap-3 mt-1 pt-3 border-t border-slate-700 border-dashed">
                                <button ${state.animating || state.stamp ? 'disabled' : ''} onclick="handleAction('detain_report')" class="py-3 bg-blue-950/40 hover:bg-blue-900/70 border border-blue-700 rounded-lg text-blue-400 font-bold transition-all flex flex-col items-center justify-center gap-1 disabled:opacity-50 active:scale-[0.98] text-[10px] sm:text-xs uppercase tracking-wider">
                                    <i data-lucide="gavel" class="w-[18px] h-[18px] mb-1"></i> Detain & Report <span class="text-slate-400 font-normal">(Safe, +Rank)</span>
                                </button>
                                <button ${state.animating || state.stamp ? 'disabled' : ''} onclick="handleAction('detain_confiscate')" class="py-3 rounded-lg font-bold transition-all flex flex-col items-center justify-center gap-1 disabled:opacity-50 active:scale-[0.98] text-[10px] sm:text-xs uppercase tracking-wider relative overflow-hidden group ${state.currentNPC.isBomber ? 'bg-orange-950/60 border-orange-700 text-orange-400 animate-pulse' : 'bg-purple-950/40 hover:bg-purple-900/70 border-purple-700 text-purple-400'}">
                                    <div class="absolute inset-0 transition-colors ${state.currentNPC.isBomber ? 'bg-orange-500/20' : 'bg-purple-500/10 group-hover:bg-purple-500/20'}"></div>
                                    <div class="absolute top-0 right-0 bg-red-600 text-white text-[9px] px-1 font-black">GAMBLE</div>
                                    <i data-lucide="${state.currentNPC.isBomber ? 'bomb' : 'scan'}" class="w-[18px] h-[18px] mb-1 relative z-10"></i>
                                    <span class="relative z-10">Secretly Loot <span class="text-slate-400 font-normal">(? Comfort, Risk)</span></span>
                                </button>
                            </div>` : ''}

                            ${state.scanStatus !== 'contraband' && !state.currentNPC?.isWanted && cBribeVal > 0 ? `
                            <button ${state.animating || state.stamp || state.scanStatus === 'scanning' ? 'disabled' : ''} onclick="handleAction('bribe')" class="w-full py-3 border rounded-lg font-bold transition-colors flex items-center justify-center gap-2 text-sm disabled:opacity-50 active:scale-[0.98] ${state.currentNPC.isVIP ? 'bg-amber-950/40 border-amber-500 text-amber-500 shadow-[0_0_15px_rgba(245,158,11,0.2)] animate-pulse' : 'bg-green-950/30 hover:bg-green-900/60 border-green-800/50 hover:border-green-500 text-green-400'}">
                                <i data-lucide="dollar-sign" class="w-[18px] h-[18px]"></i> Take Bribe (+${cBribeVal} CMF, Breaks Streak, -Rank)
                            </button>` : ''}

                            ${state.scanStatus !== 'contraband' && !state.currentNPC?.isWanted && state.directive?.type === 'ridiculous' ? `
                            <button ${state.animating || state.stamp || state.scanStatus === 'scanning' ? 'disabled' : ''} onclick="handleAction('ridiculous')" class="w-full py-3 bg-amber-950/30 hover:bg-amber-900/60 border border-amber-800/50 hover:border-amber-500 rounded-lg text-amber-500 font-bold transition-colors flex items-center justify-center gap-2 text-sm disabled:opacity-50 active:scale-[0.98]">
                                <i data-lucide="alert-triangle" class="w-[18px] h-[18px]"></i> Demand: "${state.directive.ridiculousItem}" (Follow Protocol)
                            </button>` : ''}
                        </div>
                    </footer>
                </div>`;
            }

            root.innerHTML = html;
            
            // Re-initialize Lucide icons for the newly injected HTML
            lucide.createIcons();
        };

        // Initialize App
        render();

    </script>
</body>
</html>
